<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f97316" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Poppins fontu (latin-ext = Türkçe karakter desteği). css2 endpoint'i
         Türkçe için latin-ext subset'ini otomatik servis eder. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      [data-radix-dialog-overlay] {
        position: fixed;
        inset: 0;
        z-index: 50;
        background-color: rgba(0, 0, 0, 0.7);
      }
      [data-radix-dialog-content] {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 51;
        transform: translate(-50%, -50%);
        background: white;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        max-width: 28rem;
        width: 100%;
      }
      .bg-background { background-color: white; }
      .text-muted-foreground { color: #6b7280; }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript gereklidir.</noscript>
    <div id="root"></div>
  </body>
</html>
